<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Info</title>
    <link rel="shortcut icon" href="./globe.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="title"><h1>Country Info Provider</h1></div>
    <div class="card-container">
      <div class="add-card">
        <h1 style="font-size: 180px; color: aliceblue">+</h1>
      </div>
    </div>
    <div class="modal">
      <form class="modal-content">
        <span class="close">&times;</span>
        <h2>Enter Country Name</h2>
        <input type="text" class="countryInput" placeholder="e.g. Tunisia" />
        <button class="submitCountry">Submit</button>
        
      </form>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
